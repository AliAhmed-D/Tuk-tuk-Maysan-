<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تكتك ميسان</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <div class="header">
        <h1>🛺 تكتك ميسان</h1>
        <div class="info-bar">
            <div class="status-badge">الطلبات: <span id="order-count">0</span></div>
            <div class="status-badge" id="gps-status">تحديد الموقع...</div>
            <div class="status-badge">الأجرة: 2,000 د.ع</div>
            <div class="status-badge action-btn" onclick="handleOrder()">إرسال الطلب 🛺</div>
        </div>
    </div>

    <div class="input-container">
        <select id="area-select" class="custom-select">
            <option value="">-- اختر الوجهة في العمارة --</option>
            <optgroup label="🎓 الجامعات والكليات">
                <option value="جامعة ميسان - المجمع الرئيسي">جامعة ميسان - المجمع الرئيسي</option>
                <option value="جامعة ميسان - كلية الطب">جامعة ميسان - كلية الطب</option>
                <option value="كلية الإمام الكاظم (ع)">كلية الإمام الكاظم (ع)</option>
                <option value="جامعة المنارة">جامعة المنارة</option>
                <option value="كلية العمارة الجامعة">كلية العمارة الجامعة</option>
            </optgroup>
            <optgroup label="🏡 مناطق العمارة">
                <option value="حي الربيع">حي الربيع</option>
                <option value="حي القصور">حي القصور</option>
                <option value="حي الغدير (العرضات)">حي الغدير (العرضات)</option>
                <option value="حي المعلمين">حي المعلمين</option>
                <option value="حي الحسين الجديد">حي الحسين الجديد</option>
                <option value="حي الحسين القديم">حي الحسين القديم</option>
                <option value="قطاع 30">قطاع 30</option>
                <option value="سوق العمارة">سوق العمارة</option>
                <option value="حي الماجدية">حي الماجدية</option>
                <option value="أبي رمانة">أبي رمانة</option>
            </optgroup>
        </select>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, uMark;
    const price = "2,000 د.ع";
    const phone = "9647726512076";
    let orderCount = localStorage.getItem('totalOrders') || 0;
    document.getElementById('order-count').innerText = orderCount;

    function init() {
        map = L.map('map', { zoomControl: false }).setView([31.8444, 47.1447], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.35 }).addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                const loc = [p.coords.latitude, p.coords.longitude];
                if (!uMark) { uMark = L.marker(loc).addTo(map); map.setView(loc, 17); }
                else { uMark.setLatLng(loc); }
                document.getElementById('gps-status').innerText = "الموقع نشط ✅";
            }, null, { enableHighAccuracy: true });
        }
    }

    function handleOrder() {
        const area = document.getElementById('area-select').value;
        if (!area) {
            alert("حبيبي، حدد وجهتك أولاً"); return;
        }
        
        const lat = uMark ? uMark.getLatLng().lat : 31.8444;
        const lng = uMark ? uMark.getLatLng().lng : 47.1447;
        const msg = encodeURIComponent(`طلب تكتك ميسان\nالوجهة: ${area}\nالأجرة: ${price}\nالموقع: https://www.google.com/maps?q=${lat},${lng}`);
        
        orderCount++;
        localStorage.setItem('totalOrders', orderCount);
        document.getElementById('order-count').innerText = orderCount;
        
        window.location.href = `https://wa.me/${phone}?text=${msg}`;
    }

    window.onload = init;
</script>
</body>
</html>
